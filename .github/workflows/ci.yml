name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: adnanh7/fx-prime-backend
  FRONTEND_IMAGE: adnanh7/fx-prime-frontend

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Checkout shared types from backend repo
        uses: actions/checkout@v6
        with:
          repository: Adnan4141/fx-prime-backend
          ref: main
          path: _backend-types
          token: ${{ secrets.REPO_PAT }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            packages/types
      - name: Place types where frontend expects them
        run: |
          mkdir -p ../backend/packages
          cp -a _backend-types/packages/types ../backend/packages/types
          bun install --cwd ../backend/packages/types
          bun run --cwd ../backend/packages/types build
      - name: Install frontend
        run: bun install --cwd .
      - name: Build frontend
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
      - name: Frontend bundle budget
        run: |
          FIRST=$(du -sb .next/static | cut -f1)
          echo "First load JS/CSS static size: ${FIRST} bytes"
          MAX=15728640
          if [ "$FIRST" -gt "$MAX" ]; then
            echo "Static bundle exceeds budget (${MAX} bytes)"
            exit 1
          fi
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup SSH for production URL discovery
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          for i in 1 2 3 4 5; do
            ssh-keyscan -T 10 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying..."
            sleep 3
          done
      - name: Resolve Docker build public URLs
        env:
          NEXT_PUBLIC_API_URL_VAR: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL_VAR: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail
          API_URL="${NEXT_PUBLIC_API_URL_VAR:-http://localhost:4000/api/v1}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL_VAR:-http://localhost:3000}"

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            if [ -z "${NEXT_PUBLIC_SITE_URL_VAR:-}" ]; then
              SITE_URL=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
                "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
                "curl -fsS --max-time 3 http://127.0.0.1:4040/api/tunnels 2>/dev/null | python3 -c 'import json, sys; data=json.load(sys.stdin); print(next((t.get(\"public_url\", \"\") for t in data.get(\"tunnels\", []) if t.get(\"public_url\", \"\").startswith(\"https://\")), \"\"))'" \
                2>/dev/null || true)
            fi

            if [ -z "$SITE_URL" ]; then
              echo "NEXT_PUBLIC_SITE_URL repo variable is empty and ngrok URL could not be detected from VPS"
              exit 1
            fi

            if [ -z "${NEXT_PUBLIC_API_URL_VAR:-}" ]; then
              API_URL="${SITE_URL%/}/api/v1"
            fi
          fi

          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "Using NEXT_PUBLIC_API_URL=$API_URL"
          echo "Using NEXT_PUBLIC_SITE_URL=$SITE_URL"
      - name: Build and optionally push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:main
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            APP_DIR=.
            TYPES_DIR=_backend-types/packages/types
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_ssh:
    needs: [frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-vps-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - name: Checkout backend deploy assets
        uses: actions/checkout@v6
        with:
          repository: Adnan4141/fx-prime-backend
          ref: main
          path: _backend-deploy
          token: ${{ secrets.REPO_PAT }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            deploy
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          for i in 1 2 3 4 5; do
            ssh-keyscan -T 10 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying..."
            sleep 3
          done
      - name: Copy deploy assets to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'mkdir -p /var/www/fxprime/deploy /var/www/fxprime/uploads'
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            _backend-deploy/deploy/docker-compose.yml \
            _backend-deploy/deploy/docker-deploy.sh \
            _backend-deploy/deploy/backend.env.example \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/fxprime/deploy/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'chmod +x /var/www/fxprime/deploy/docker-deploy.sh'
      - name: Deploy Docker stack on VPS
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' DOCKERHUB_TOKEN='${DOCKERHUB_TOKEN}' BACKEND_IMAGE='${BACKEND_IMAGE}:main' FRONTEND_IMAGE='${FRONTEND_IMAGE}:main' bash /var/www/fxprime/deploy/docker-deploy.sh frontend"
